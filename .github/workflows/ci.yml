name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  aot-tool-build:
    name: AOT Tool - Build & Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
      - name: Build
        run: dotnet build
        working-directory: src/aot-tool
      - name: Test
        run: dotnet test --no-build --verbosity normal
        working-directory: src/aot-tool

  ui-extension-build:
    name: UI Extension - Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
        working-directory: src/vscode-ui-extension
      - name: Build
        run: npm run build
        working-directory: src/vscode-ui-extension

  workspace-extension-build:
    name: Workspace Extension - Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
        working-directory: src/vscode-workspace-extension
      - name: Build
        run: npm run build
        working-directory: src/vscode-workspace-extension

  feature-validate:
    name: Devcontainer Feature - Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Validate feature metadata
        run: |
          cd src/devcontainer-feature/src/dotnet-dev-certs
          # Validate JSON is well-formed
          python3 -c "import json; json.load(open('devcontainer-feature.json'))"
          echo "Feature metadata is valid."
      - name: Verify install.sh is executable-compatible
        run: bash -n src/devcontainer-feature/src/dotnet-dev-certs/install.sh
