name: Build Extensions

on:
  workflow_call:
    inputs:
      production:
        description: Use production build (minified, no sourcemaps)
        type: boolean
        default: false
      upload-vsix:
        description: Package and upload VSIX artifacts
        type: boolean
        default: false

jobs:
  extensions:
    name: Build & Test Extensions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build UI Extension
        run: npm run ${{ inputs.production && 'build:prod' || 'build' }} -w src/vscode-ui-extension

      - name: Test UI Extension
        run: npm test -w src/vscode-ui-extension

      - name: Build Workspace Extension
        run: npm run ${{ inputs.production && 'build:prod' || 'build' }} -w src/vscode-workspace-extension

      - name: Package UI Extension VSIX
        run: npm run package -w src/vscode-ui-extension

      - name: Package Workspace Extension VSIX
        run: npm run package -w src/vscode-workspace-extension

      - name: Upload VSIX artifacts
        if: inputs.upload-vsix
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: src/vscode-*-extension/*.vsix

  feature:
    name: Validate Devcontainer Feature
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate feature metadata and consistency
        run: node test/validate-feature.mjs

      - name: Shellcheck install.sh
        run: shellcheck src/devcontainer-feature/src/devcontainer-dev-certs/install.sh

      - name: Shellcheck setup-cert.sh
        run: shellcheck src/devcontainer-feature/src/devcontainer-dev-certs/scripts/setup-cert.sh
