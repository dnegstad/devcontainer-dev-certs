name: Release Extensions

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-ui-extension:
    name: UI Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci
        working-directory: src/vscode-ui-extension

      - name: Build
        run: npm run build:prod
        working-directory: src/vscode-ui-extension

      - name: Package VSIX
        run: npx @vscode/vsce package
        working-directory: src/vscode-ui-extension

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-ui
          path: src/vscode-ui-extension/*.vsix

  build-workspace-extension:
    name: Workspace Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm ci
        working-directory: src/vscode-workspace-extension
      - name: Build
        run: npm run build:prod
        working-directory: src/vscode-workspace-extension
      - name: Package VSIX
        run: npx @vscode/vsce package
        working-directory: src/vscode-workspace-extension
      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsix-workspace
          path: src/vscode-workspace-extension/*.vsix

  publish:
    name: Publish
    needs: [build-ui-extension, build-workspace-extension]
    runs-on: ubuntu-latest
    steps:
      - name: Download all VSIXes
        uses: actions/download-artifact@v4
        with:
          pattern: vsix-*
          path: vsix
          merge-multiple: true

      - name: List VSIXes
        run: ls -la vsix/

      - name: Publish to Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          for vsix in vsix/*.vsix; do
            echo "Publishing ${vsix}..."
            npx @vscode/vsce publish --packagePath "${vsix}"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vsix/*
          generate_release_notes: true
